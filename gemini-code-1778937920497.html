<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title id="pageTitle">多國語言即時逐字稿工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
            padding: 20px;
        }
        #uiLangToggle {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        #uiLangToggle:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        h1 {
            color: white;
            margin: 60px 0 30px 0;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .transcript-container {
            width: 90%;
            max-width: 900px;
            height: 45vh;
            margin-bottom: 20px;
            border: none;
            border-radius: 16px;
            background-color: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }
        #transcript {
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 16px;
            line-height: 1.8;
            margin: 0;
            font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
            color: #333;
        }
        .interim { color: #888; font-style: italic; }
        .placeholder { color: #999; }

        .volume-meter {
            width: 90%;
            max-width: 900px;
            height: 24px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
        }
        .volume-level {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.1s ease-out;
            will-change: transform;
            box-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .settings {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            flex-wrap: wrap;
            justify-content: center;
        }
        .settings label { color: white; font-weight: 600; font-size: 15px; }
        .settings select, .settings input[type="url"] {
            padding: 10px 15px;
            font-size: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .settings select:hover, .settings input[type="url"]:hover {
            background: white;
            border-color: rgba(255, 255, 255, 0.5);
        }

        .vosk-config {
            width: 90%;
            max-width: 900px;
            margin-bottom: 20px;
            background: rgba(255, 255, 255, 0.15);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            display: none;
        }
        .vosk-config.visible { display: block; }
        .vosk-config .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .vosk-config label { color: white; font-weight: 600; font-size: 14px; min-width: 80px; }
        .vosk-config select, .vosk-config input[type="url"] {
            flex: 1;
            min-width: 200px;
            padding: 8px 12px;
            font-size: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.9);
        }
        #loadModelBtn {
            padding: 8px 20px;
            font-size: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        #loadModelBtn:hover:not(:disabled) {
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transform: translateY(-1px);
        }
        #loadModelBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        .model-progress {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        .model-progress.visible { display: block; }
        .model-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .model-status {
            color: white;
            font-size: 13px;
            margin-top: 8px;
            text-align: center;
        }
        .model-status.error { color: #ff6b6b; }
        .model-status.success { color: #8BC34A; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .button-row { display: flex; gap: 15px; }
        button {
            padding: 14px 30px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            color: white;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:active { transform: translateY(2px); }
        button:disabled {
            background: linear-gradient(135deg, #9E9E9E 0%, #BDBDBD 100%);
            cursor: not-allowed;
            opacity: 0.6;
        }
        #controlBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            min-width: 160px;
        }
        #controlBtn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
            transform: translateY(-2px);
        }
        #controlBtn.listening::after {
            content: '●';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #ff4444;
            font-size: 20px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        #exportBtn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #exportBtn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.4);
            transform: translateY(-2px);
        }
        #copyBtn {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
            min-width: 130px;
        }
        #clearBtn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        #clearBtn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.4);
            transform: translateY(-2px);
        }
        #copyBtn:hover:not(:disabled) {
            box-shadow: 0 6px 20px rgba(253, 160, 133, 0.4);
            transform: translateY(-2px);
        }

        .warning-notice {
            background: rgba(255, 193, 7, 0.95);
            color: #000;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 2px solid rgba(255, 152, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .warning-notice::before { content: '⚠️'; font-size: 18px; }
        .warning-notice.offline {
            background: rgba(76, 175, 80, 0.95);
            border-color: rgba(56, 142, 60, 0.5);
        }
        .warning-notice.offline::before { content: '🔒'; }

        .privacy-notice {
            width: 90%;
            max-width: 900px;
            font-size: 14px;
            margin-top: auto;
            margin-bottom: 20px;
        }
        .privacy-notice details {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }
        .privacy-notice summary {
            padding: 15px 20px;
            font-weight: bold;
            cursor: pointer;
            outline: none;
            color: white;
            font-size: 15px;
        }
        .privacy-notice summary:hover { background: rgba(255, 255, 255, 0.1); }
        .privacy-notice .content {
            padding: 0 20px 20px 20px;
            line-height: 1.6;
            color: white;
        }
        .privacy-notice h3 { margin-top: 15px; margin-bottom: 8px; color: #FFD54F; }
        .privacy-notice ul { padding-left: 20px; margin: 0; }
        .privacy-notice ul li { margin-bottom: 8px; }
        .privacy-notice ul li.safe::before { content: '✅ '; }
        .privacy-notice ul li.unsafe::before { content: '❌ '; }
        .privacy-notice strong { color: #FF6B6B; font-weight: 700; }

        @media (max-width: 768px) {
            h1 { font-size: 22px; margin: 50px 20px 20px 20px; }
            .transcript-container { height: 40vh; }
            .button-row { flex-direction: column; width: 100%; }
            button { width: 100%; }
            .settings { flex-direction: column; width: 90%; }
            .vosk-config .row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <button id="uiLangToggle" title="Switch the user interface language">Switch to English</button>

    <h1 id="main-title">多國語言即時逐字稿工具</h1>

    <div class="transcript-container" id="transcriptContainer">
        <pre id="transcript"><span class="placeholder" id="placeholder-text"></span><span id="final-text"></span><span id="interim-text" class="interim"></span></pre>
    </div>

    <div class="volume-meter">
        <div class="volume-level" id="volumeLevel"></div>
    </div>

    <div class="settings">
        <label for="engineSelector" id="engine-label">引擎:</label>
        <select id="engineSelector">
            <option value="webspeech">Web Speech API (Google)</option>
            <option value="vosk">Vosk (離線)</option>
        </select>
        <label for="languageSelector" id="lang-label">辨識語言:</label>
        <select id="languageSelector" title="選擇要進行辨識的語言">
            <option value="en-US">English (US)</option>
            <option value="en-GB">English (UK)</option>
            <option value="zh-TW">中文 (台灣TW)</option>
            <option value="zh-CN">中文 (中国大陆CN)</option>
            <option value="zh-HK">粵語 (香港HK)</option>
            <option value="ja-JP">日本語(JP)</option>
            <option value="ko-KR">한국어(KR)</option>
            <option value="es-ES">Español (España)</option>
            <option value="fr-FR">Français</option>
            <option value="de-DE">Deutsch</option>
        </select>
    </div>

    <div class="vosk-config" id="voskConfig">
        <div class="row">
            <label id="vosk-model-label">模型:</label>
            <select id="voskModelPreset">
                <option value="">-- 選擇預設模型 --</option>
                <option value="vosk-model-small-en-us-0.15">English (small, ~40MB)</option>
                <option value="vosk-model-small-cn-0.22">中文 (small, ~42MB)</option>
                <option value="vosk-model-small-ja-0.22">日本語 (small, ~48MB)</option>
                <option value="vosk-model-small-ko-0.22">한국어 (small, ~42MB)</option>
                <option value="vosk-model-small-fr-0.22">Français (small, ~40MB)</option>
                <option value="vosk-model-small-de-0.15">Deutsch (small, ~45MB)</option>
                <option value="vosk-model-small-es-0.42">Español (small, ~39MB)</option>
                <option value="custom">自訂 URL...</option>
            </select>
        </div>
        <div class="row" id="customUrlRow" style="display:none;">
            <label id="vosk-url-label">URL:</label>
            <input type="url" id="voskModelUrl" placeholder="https://your-server.com/model.tar.gz">
        </div>
        <div class="row" style="justify-content: center;">
            <button id="loadModelBtn">載入模型</button>
        </div>
        <div class="model-progress" id="modelProgress">
            <div class="model-progress-bar" id="modelProgressBar"></div>
        </div>
        <div class="model-status" id="modelStatus"></div>
    </div>

    <div class="controls">
        <div class="button-row">
            <button id="controlBtn" title="點擊以開始語音辨識">開始辨識</button>
            <button id="copyBtn" disabled title="停止辨識後才能複製">複製內容</button>
            <button id="exportBtn" disabled title="停止辨識後才能匯出">輸出逐字稿</button>
            <button id="clearBtn" title="清空逐字稿">清空</button>
        </div>
        <div class="warning-notice" id="warning-text">
            本工具將把收到音檔上傳 Google 請謹慎使用
        </div>
    </div>

    <div class="privacy-notice">
        <details>
            <summary id="privacy-summary">使用須知 & 隱私聲明</summary>
            <div class="content">
                <p id="how-it-works-text"></p>
                <h3 id="suitable-scenarios-title"></h3>
                <ul id="suitable-scenarios-list"></ul>
                <h3 id="risk-scenarios-title"></h3>
                <ul id="risk-scenarios-list"></ul>
                <p id="privacy-conclusion"></p>
            </div>
        </details>
    </div>

                voskModelReady: "模型已載入！可以開始使用。",
                voskModelError: "模型載入失敗。請確認 URL 及 CORS 設定。",
                voskLibError: "Vosk 函式庫載入失敗，請確認網路連線。",
                voskSelectModel: "請先選擇並載入模型。",
                voskCorsHint: "若載入失敗，可能是模型伺服器不允許跨域請求。請嘗試將模型放到自己的伺服器並啟用 CORS。",
            }
        };

        const CONFIG = {
            RESTART_DELAY_MOBILE: 200,
            RESTART_DELAY_DESKTOP: 500,
            AUDIO_METER_DELAY: 300,
            SCROLL_THRESHOLD: 50,
            VOLUME_MULTIPLIER: 10,
            FEEDBACK_DURATION: 2000,
            MIN_SEGMENTS_FOR_EXPORT: 2,
            VOSK_SAMPLE_RATE: 16000,
            VOSK_BUFFER_SIZE: 8192,
        };

        const ENGINE = { WEB_SPEECH: 'webspeech', VOSK: 'vosk' };

        const state = {
            currentUiLang: 'zh',
            engine: ENGINE.WEB_SPEECH,
            startTime: null,
            endTime: null,
            transcriptSegments: [],
            renderedSegmentCount: 0,
            isRecognizing: false,
            interimTranscript: '',
            isManualStop: false,
            recognition: null,
            isMobile: /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent),
            restartTimeout: null,
            recognitionActive: false,
        };

        const voskState = {
            libLoaded: false,
            libLoading: false,
            model: null,
            modelLoading: false,
            modelReady: false,
            recognizer: null,
            audioContext: null,
            stream: null,
            processorNode: null,
        };

        const audioState = {
            context: null,
            stream: null,
            analyser: null,
            animationFrameId: null,
            dataArray: null,
        };

        function init() {
            loadPreferences();
            setupEventListeners();
            initSpeechRecognition();
            setUiLanguage(state.currentUiLang);
            updateEngineUI();
        }

        function setupEventListeners() {
            UIElements.uiLangToggle.addEventListener('click', toggleUiLanguage);
            UIElements.controlBtn.addEventListener('click', toggleRecognition);
            UIElements.exportBtn.addEventListener('click', exportTranscript);
            UIElements.copyBtn.addEventListener('click', copyTranscript);
            UIElements.clearBtn.addEventListener('click', clearTranscript);
            UIElements.languageSelector.addEventListener('change', () => {
                if (state.recognition) {
                    state.recognition.lang = UIElements.languageSelector.value;
                }
                savePreferences();
            });
            UIElements.engineSelector.addEventListener('change', () => {
                state.engine = UIElements.engineSelector.value;
                updateEngineUI();
                savePreferences();
            });
            UIElements.voskModelPreset.addEventListener('change', () => {
                const val = UIElements.voskModelPreset.value;
                UIElements.customUrlRow.style.display = val === 'custom' ? 'flex' : 'none';
                if (val && val !== 'custom') {
                    UIElements.voskModelUrl.value = `${VOSK_MODEL_BASE}/${val}.zip`;
                }
            });
            UIElements.loadModelBtn.addEventListener('click', loadVoskModel);
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space' && e.target === document.body) {
                    e.preventDefault();
                    toggleRecognition();
                }
            });
        }

        function initSpeechRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                if (state.engine === ENGINE.WEB_SPEECH) {
                    UIElements.controlBtn.disabled = true;
                }
                return;
            }
            state.recognition = new SpeechRecognition();
            state.recognition.continuous = !state.isMobile;
            state.recognition.interimResults = true;
            state.recognition.maxAlternatives = 1;

            state.recognition.onstart = handleRecognitionStart;
            state.recognition.onerror = handleRecognitionError;
            state.recognition.onend = handleRecognitionEnd;
            state.recognition.onresult = handleRecognitionResult;
        }

        function updateEngineUI() {
            const isVosk = state.engine === ENGINE.VOSK;
            UIElements.voskConfig.classList.toggle('visible', isVosk);
            UIElements.languageSelector.parentElement && (UIElements.languageSelector.style.display = isVosk ? 'none' : '');
            const langLabelEl = document.getElementById('lang-label');
            if (langLabelEl) langLabelEl.style.display = isVosk ? 'none' : '';

            const t = translations[state.currentUiLang];
            UIElements.warningText.textContent = isVosk ? t.warningTextVosk : t.warningTextGoogle;
            UIElements.warningText.classList.toggle('offline', isVosk);

            if (isVosk) {
                UIElements.controlBtn.disabled = !voskState.modelReady;
            } else {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                UIElements.controlBtn.disabled = !SpeechRecognition;
            }
        }

        // --- Vosk Engine ---

        function loadVoskLibrary() {
            return new Promise((resolve, reject) => {
                if (voskState.libLoaded && window.Vosk) { resolve(); return; }
                if (voskState.libLoading) { reject(new Error('Already loading')); return; }
                voskState.libLoading = true;
                const script = document.createElement('script');
                script.src = VOSK_CDN;
                script.onload = () => { voskState.libLoaded = true; voskState.libLoading = false; resolve(); };
                script.onerror = () => { voskState.libLoading = false; reject(new Error('Script load failed')); };
                document.head.appendChild(script);
            });
        }

        async function loadVoskModel() {
            const t = translations[state.currentUiLang];
            const modelUrl = UIElements.voskModelUrl.value.trim();
            const preset = UIElements.voskModelPreset.value;

            if (!modelUrl && (!preset || preset === 'custom')) {
                setModelStatus(t.voskSelectModel, 'error');
                return;
            }

            const url = modelUrl || `${VOSK_MODEL_BASE}/${preset}.zip`;

            UIElements.loadModelBtn.disabled = true;
            UIElements.loadModelBtn.textContent = t.loadModelBtnLoading;
            UIElements.modelProgress.classList.add('visible');
            UIElements.modelProgressBar.style.width = '0%';
            setModelStatus(t.voskLoadingLib, '');

            try {
                await loadVoskLibrary();
            } catch (e) {
                setModelStatus(t.voskLibError, 'error');
                resetLoadBtn();
                return;
            }

            setModelStatus(t.voskLoadingModel, '');

            try {
                if (voskState.model) {
                    voskState.model.terminate();
                    voskState.model = null;
                }

                voskState.modelLoading = true;
                const model = await window.Vosk.createModel(url);
                voskState.model = model;
                voskState.modelReady = true;
                voskState.modelLoading = false;

                UIElements.modelProgressBar.style.width = '100%';
                setModelStatus(t.voskModelReady, 'success');
                UIElements.controlBtn.disabled = false;
            } catch (e) {
                console.error('Vosk model load error:', e);
                voskState.modelLoading = false;
                voskState.modelReady = false;
                setModelStatus(t.voskModelError + '\n' + t.voskCorsHint, 'error');
            }

            resetLoadBtn();
        }

        function setModelStatus(text, type) {
            UIElements.modelStatus.textContent = text;
            UIElements.modelStatus.className = 'model-status' + (type ? ' ' + type : '');
        }

        function resetLoadBtn() {
            const t = translations[state.currentUiLang];
            UIElements.loadModelBtn.disabled = false;
            UIElements.loadModelBtn.textContent = t.loadModelBtn;
        }

        function startVoskRecognition() {
            const t = translations[state.currentUiLang];
            if (!voskState.modelReady || !voskState.model) {
                alert(t.voskSelectModel);
                return;
            }

            state.isManualStop = false;
            state.startTime = new Date();
            state.transcriptSegments = [{ timestamp: state.startTime, text: '--- Recording Start / 錄音開始 ---' }];
            state.renderedSegmentCount = 0;
            state.interimTranscript = '';
            UIElements.finalText.textContent = '';
            updateTranscriptDisplay();

            navigator.mediaDevices.getUserMedia({
                audio: {
                    echoCancellation: true,
                    noiseSuppression: true,
                    channelCount: 1,
                    sampleRate: CONFIG.VOSK_SAMPLE_RATE,
                }
            }).then(stream => {
                voskState.stream = stream;
                voskState.audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: CONFIG.VOSK_SAMPLE_RATE });

                voskState.recognizer = new voskState.model.KaldiRecognizer(CONFIG.VOSK_SAMPLE_RATE);
                voskState.recognizer.setWords(false);

                voskState.recognizer.on('result', (message) => {
                    const text = message.result?.text;
                    if (text) {
                        state.transcriptSegments.push({ timestamp: new Date(), text: text });
                        state.interimTranscript = '';
                        updateTranscriptDisplay();
                        updateButtonStates();
                    }
                });

                voskState.recognizer.on('partialresult', (message) => {
                    const partial = message.result?.partial;
                    if (partial) {
                        state.interimTranscript = partial;
                        updateTranscriptDisplay();
                    }
                });

                const source = voskState.audioContext.createMediaStreamSource(stream);

                voskState.processorNode = voskState.audioContext.createScriptProcessor(CONFIG.VOSK_BUFFER_SIZE, 1, 1);
                voskState.processorNode.onaudioprocess = (event) => {
                    try {
                        if (voskState.recognizer) {
                            voskState.recognizer.acceptWaveform(event.inputBuffer);
                        }
                    } catch (e) {
                        console.error('Vosk acceptWaveform error:', e);
                    }
                };

                source.connect(voskState.processorNode);
                voskState.processorNode.connect(voskState.audioContext.destination);

                state.isRecognizing = true;
                state.recognitionActive = true;
                UIElements.languageSelector.disabled = true;
                UIElements.engineSelector.disabled = true;
                updateButtonStates();

                setTimeout(() => startAudioMeter().catch(err => console.warn("Could not start audio meter:", err)), CONFIG.AUDIO_METER_DELAY);

            }).catch(err => {
                console.error('Microphone error:', err);
                alert(t.micDeniedError);
            });
        }

        function stopVoskRecognition() {
            state.isManualStop = true;

            if (voskState.processorNode) {
                voskState.processorNode.disconnect();
                voskState.processorNode = null;
            }
            if (voskState.stream) {
                voskState.stream.getTracks().forEach(track => track.stop());
                voskState.stream = null;
            }
            if (voskState.audioContext && voskState.audioContext.state !== 'closed') {
                voskState.audioContext.close();
                voskState.audioContext = null;
            }
            if (voskState.recognizer) {
                voskState.recognizer.remove();
                voskState.recognizer = null;
            }

            state.isRecognizing = false;
            state.recognitionActive = false;
            UIElements.languageSelector.disabled = false;
            UIElements.engineSelector.disabled = false;
            state.endTime = new Date();
            state.interimTranscript = '';
            updateTranscriptDisplay();
            updateButtonStates();
            stopAudioMeter();
        }

        // --- Web Speech API Engine ---

        function toggleUiLanguage() {
            const newLang = state.currentUiLang === 'zh' ? 'en' : 'zh';
            setUiLanguage(newLang);
            savePreferences();
        }

        function setUiLanguage(lang) {
            state.currentUiLang = lang;
            const t = translations[lang];

            UIElements.pageTitle.textContent = t.pageTitle;
            UIElements.mainTitle.textContent = t.mainTitle;
            UIElements.engineLabel.textContent = t.engineLabel;
            UIElements.langLabel.textContent = t.langLabel;
            UIElements.exportBtn.textContent = t.exportBtn;
            UIElements.copyBtn.textContent = t.copyBtn;
            UIElements.clearBtn.textContent = t.clearBtn;
            UIElements.clearBtn.title = t.clearBtnTooltip;
            UIElements.uiLangToggle.textContent = t.toggleUiLangBtn;
            UIElements.placeholderText.textContent = t.placeholder;
            UIElements.uiLangToggle.title = t.uiLangToggleTooltip;
            UIElements.languageSelector.title = t.languageSelectorTooltip;
            UIElements.voskModelLabel.textContent = t.voskModelLabel;
            UIElements.voskUrlLabel.textContent = t.voskUrlLabel;
            UIElements.loadModelBtn.textContent = voskState.modelLoading ? t.loadModelBtnLoading : t.loadModelBtn;

            const isVosk = state.engine === ENGINE.VOSK;
            UIElements.warningText.textContent = isVosk ? t.warningTextVosk : t.warningTextGoogle;

            UIElements.privacySummary.textContent = t.privacySummary;
            UIElements.howItWorksText.textContent = t.howItWorksText;
            UIElements.suitableScenariosTitle.textContent = t.suitableScenariosTitle;
            UIElements.riskScenariosTitle.textContent = t.riskScenariosTitle;
            UIElements.privacyConclusion.innerHTML = t.privacyConclusion;

            UIElements.suitableScenariosList.innerHTML = t.suitableScenarios.map(item => `<li class="safe">${item}</li>`).join('');
            UIElements.riskScenariosList.innerHTML = t.riskScenarios.map(item => `<li class="unsafe">${item}</li>`).join('');

            updateButtonStates();
        }

        function updateButtonStates() {
            const t = translations[state.currentUiLang];
            UIElements.controlBtn.textContent = state.isRecognizing ? t.stopBtn : t.startBtn;
            UIElements.controlBtn.title = state.isRecognizing ? t.controlBtnTooltipStop : t.controlBtnTooltipStart;
            UIElements.controlBtn.classList.toggle('listening', state.isRecognizing);

            const canExportOrCopy = state.transcriptSegments.length > CONFIG.MIN_SEGMENTS_FOR_EXPORT;
            UIElements.exportBtn.disabled = !canExportOrCopy;
            UIElements.copyBtn.disabled = !canExportOrCopy;

            UIElements.exportBtn.title = canExportOrCopy ? t.exportBtnTooltip : t.exportBtnTooltipDisabled;
            UIElements.copyBtn.title = canExportOrCopy ? t.copyBtnTooltip : t.copyBtnTooltipDisabled;
        }

        function toggleRecognition() {
            if (state.isRecognizing) {
                if (state.engine === ENGINE.VOSK) stopVoskRecognition();
                else stopRecognition();
            } else {
                if (state.engine === ENGINE.VOSK) startVoskRecognition();
                else startRecognition();
            }
        }

        function startRecognition() {
            state.isManualStop = false;
            state.recognition.lang = UIElements.languageSelector.value;
            state.startTime = new Date();
            state.transcriptSegments = [{ timestamp: state.startTime, text: '--- Recording Start / 錄音開始 ---' }];
            state.renderedSegmentCount = 0;
            state.interimTranscript = '';
            UIElements.finalText.textContent = '';

            updateTranscriptDisplay();

            setTimeout(() => startAudioMeter().catch(err => console.warn("Could not start audio meter:", err)), CONFIG.AUDIO_METER_DELAY);

            try {
                if (!state.recognitionActive) state.recognition.start();
            } catch (e) {
                console.error("Error starting recognition:", e);
                alert("無法啟動語音辨識，請重新整理頁面再試。\nFailed to start recognition, please refresh and try again.");
            }
        }

        function stopRecognition() {
            state.isManualStop = true;
            if (state.recognitionActive) {
                state.recognition.stop();
            } else {
                handleRecognitionEnd();
            }
        }

        function handleRecognitionStart() {
            state.recognitionActive = true;
            state.isRecognizing = true;
            UIElements.languageSelector.disabled = true;
            UIElements.engineSelector.disabled = true;
            updateButtonStates();
        }

        function handleRecognitionError(event) {
            console.error('Speech Recognition Error:', event.error, event);
            state.recognitionActive = false;
            if (event.error === 'not-allowed') {
                alert(translations[state.currentUiLang].micDeniedError);
            } else if (event.error === 'network') {
                alert('網路連線問題,請檢查網路設定。\nNetwork error, please check your connection.');
            }
        }

        function handleRecognitionEnd() {
            state.recognitionActive = false;
            clearTimeout(state.restartTimeout);

            if (!state.isManualStop && state.isRecognizing) {
                const restartDelay = state.isMobile ? CONFIG.RESTART_DELAY_MOBILE : CONFIG.RESTART_DELAY_DESKTOP;
                state.restartTimeout = setTimeout(() => {
                    if (state.isRecognizing && !state.recognitionActive) {
                        try { state.recognition.start(); } catch (e) { console.error('Failed to auto-restart:', e); }
                    }
                }, restartDelay);
            } else {
                state.isRecognizing = false;
                UIElements.languageSelector.disabled = false;
                UIElements.engineSelector.disabled = false;
                state.endTime = new Date();
                updateButtonStates();
                stopAudioMeter();
            }
        }

        function handleRecognitionResult(event) {
            state.interimTranscript = '';
            let finalTranscriptThisTurn = '';

            for (let i = event.resultIndex; i < event.results.length; ++i) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscriptThisTurn += transcript.trim() + ' ';
                } else {
                    state.interimTranscript += transcript;
                }
            }

            if (finalTranscriptThisTurn) {
                state.transcriptSegments.push({ timestamp: new Date(), text: finalTranscriptThisTurn.trim() });
            }

            updateTranscriptDisplay();
            updateButtonStates();
        }

        // --- Shared Functions ---

        function updateTranscriptDisplay() {
            if (state.transcriptSegments.length > 0 || state.interimTranscript) {
                UIElements.placeholderText.style.display = 'none';
            } else {
                UIElements.placeholderText.style.display = 'inline';
            }

            if (state.renderedSegmentCount < state.transcriptSegments.length) {
                const newSegments = state.transcriptSegments.slice(state.renderedSegmentCount);
                const newText = newSegments.map(s => `${formatTime(s.timestamp)} ${s.text}`).join('\n');
                const prefix = state.renderedSegmentCount > 0 ? '\n' : '';
                UIElements.finalText.textContent += prefix + newText;
                state.renderedSegmentCount = state.transcriptSegments.length;
            }

            UIElements.interimText.textContent = state.interimTranscript ? '\n' + state.interimTranscript : '';

            const container = UIElements.transcriptContainer;
            const isScrolledToBottom = container.scrollHeight - container.clientHeight <= container.scrollTop + CONFIG.SCROLL_THRESHOLD;
            if (isScrolledToBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }

        function getFullTranscriptText() {
            return state.transcriptSegments.map(segment => `${formatTime(segment.timestamp)} ${segment.text}`).join('\n');
        }

        function exportTranscript() {
            if (!state.startTime) return;
            const textToSave = getFullTranscriptText().replace(/\n/g, '\r\n');
            const fileName = createFileName(state.startTime, state.endTime || new Date());
            const blob = new Blob([textToSave], { type: 'text/plain;charset=utf-8' });

            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
        }

        function copyTranscript() {
            if (state.transcriptSegments.length <= 1 && !state.interimTranscript) return;

            const textToCopy = getFullTranscriptText();
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = UIElements.copyBtn.textContent;
                UIElements.copyBtn.textContent = translations[state.currentUiLang].copyBtnSuccess;
                setTimeout(() => {
                    UIElements.copyBtn.textContent = originalText;
                }, CONFIG.FEEDBACK_DURATION);
            }, (err) => {
                console.error('Could not copy text: ', err);
                alert(translations[state.currentUiLang].copiedError);
            });
        }

        function clearTranscript() {
            state.transcriptSegments = [];
            state.renderedSegmentCount = 0;
            state.interimTranscript = '';
            state.startTime = null;
            state.endTime = null;
            UIElements.finalText.textContent = '';
            UIElements.interimText.textContent = '';
            UIElements.placeholderText.style.display = 'inline';
            updateButtonStates();
        }

        function savePreferences() {
            try {
                localStorage.setItem('stt_ui_lang', state.currentUiLang);
                localStorage.setItem('stt_rec_lang', UIElements.languageSelector.value);
                localStorage.setItem('stt_engine', state.engine);
            } catch (e) {}
        }

        function loadPreferences() {
            try {
                const savedUiLang = localStorage.getItem('stt_ui_lang');
                const savedRecLang = localStorage.getItem('stt_rec_lang');
                const savedEngine = localStorage.getItem('stt_engine');
                const browserLang = navigator.language || navigator.userLanguage;

                state.currentUiLang = savedUiLang || (browserLang.startsWith('zh') ? 'zh' : 'en');
                if (savedRecLang) UIElements.languageSelector.value = savedRecLang;
                if (savedEngine && (savedEngine === ENGINE.WEB_SPEECH || savedEngine === ENGINE.VOSK)) {
                    state.engine = savedEngine;
                    UIElements.engineSelector.value = savedEngine;
                }
            } catch (e) {}
        }

        async function startAudioMeter() {
            if (!navigator.mediaDevices?.getUserMedia) return Promise.reject('getUserMedia not supported');
            if (audioState.context) return;

            if (state.engine === ENGINE.VOSK && voskState.stream) {
                audioState.stream = voskState.stream;
            } else {
                audioState.stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            }

            audioState.context = new (window.AudioContext || window.webkitAudioContext)();
            audioState.analyser = audioState.context.createAnalyser();
            const source = audioState.context.createMediaStreamSource(audioState.stream);
            source.connect(audioState.analyser);
            audioState.dataArray = new Uint8Array(audioState.analyser.frequencyBinCount);
            drawVolume();
        }

        function stopAudioMeter() {
            if (audioState.animationFrameId) cancelAnimationFrame(audioState.animationFrameId);
            if (state.engine !== ENGINE.VOSK && audioState.stream) {
                audioState.stream.getTracks().forEach(track => track.stop());
            }
            audioState.stream = null;
            if (audioState.context?.state !== 'closed') {
                audioState.context?.close().then(() => { audioState.context = null; });
            } else {
                audioState.context = null;
            }
            UIElements.volumeLevel.style.transform = 'scaleX(0)';
        }

        function drawVolume() {
            const dataArray = audioState.dataArray;
            audioState.analyser.getByteTimeDomainData(dataArray);
            let sumSquares = 0.0;
            for (const amplitude of dataArray) {
                const a = (amplitude / 128.0) - 1.0;
                sumSquares += a * a;
            }
            const rms = Math.sqrt(sumSquares / dataArray.length);
            const volume = Math.min(100, rms * 100 * CONFIG.VOLUME_MULTIPLIER);

            UIElements.volumeLevel.style.transform = `scaleX(${volume / 100})`;

            audioState.animationFrameId = requestAnimationFrame(drawVolume);
        }

        function formatTime(date) {
            const h = formatTwoDigits(date.getHours());
            const m = formatTwoDigits(date.getMinutes());
            const s = formatTwoDigits(date.getSeconds());
            return `[${h}:${m}:${s}]`;
        }

        function formatTwoDigits(n) {
            return n < 10 ? '0' + n : String(n);
        }

        function createFileName(start, end) {
            const date = `${start.getFullYear()}-${formatTwoDigits(start.getMonth() + 1)}-${formatTwoDigits(start.getDate())}`;
            const startTimeStr = `${formatTwoDigits(start.getHours())}-${formatTwoDigits(start.getMinutes())}-${formatTwoDigits(start.getSeconds())}`;
            const endTimeStr = `${formatTwoDigits(end.getHours())}-${formatTwoDigits(end.getMinutes())}-${formatTwoDigits(end.getSeconds())}`;
            return `transcript_${date}_${startTimeStr}_to_${endTimeStr}.txt`;
        }

        document.addEventListener('DOMContentLoaded', init);
    })();
    </script>
</body>
</html>
